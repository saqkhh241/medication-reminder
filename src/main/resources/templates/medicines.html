<!doctype html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Medicines</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#111827">

<script>

<style>
/* ===== layout och design ===== */

body{
  font-family: Arial, Helvetica, sans-serif;
  margin:0;
  background:#f6f7fb;
  color:#111827;
}

header{
  background:#111827;
  color:white;
  padding:16px;
}

header h1{
  margin:0;
  font-size:22px;
}

main{
  max-width:720px;
  margin:0 auto;
  padding:16px;
}

/* knapp för att lägga till medicin */
.add{
  display:block;
  width:220px;
  margin:20px auto;
  text-align:center;
  background:#2563eb;
  color:white;
  text-decoration:none;
  padding:16px 20px;
  border-radius:14px;
  font-size:18px;
  font-weight:700;
  box-shadow:0 6px 16px rgba(0,0,0,0.15);
}

.empty{
  margin-top:14px;
  color:#6b7280;
}

/* lista med mediciner */
ul{
  list-style:none;
  padding:0;
  margin:16px 0 0 0;
}

/* varje medicinrad */
li{
  background:white;
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}

.info{
  display:flex;
  flex-direction:column;
  gap:4px;
  min-width:220px;
}

.topline{
  display:flex;
  gap:8px;
  align-items:baseline;
  flex-wrap:wrap;
}

.time{
  font-size:18px;
  font-weight:700;
}

.name{
  font-size:16px;
  font-weight:600;
}

.desc{
  font-size:14px;
  color:#6b7280;
}

/* statusetikett */
.status{
  font-size:13px;
  font-weight:700;
  padding:3px 8px;
  border-radius:999px;
  width:fit-content;
}

.status.taken{
  background:#dcfce7;
  color:#166534;
}

.status.not{
  background:#fee2e2;
  color:#991b1b;
}

.actions{
  display:flex;
  gap:8px;
  align-items:center;
}

button{
  border:none;
  padding:9px 12px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.btn-take{
  background:#e5e7eb;
  color:#111827;
}

.btn-delete{
  background:#ef4444;
  color:white;
}

button:hover{
  filter:brightness(0.97);
}
</style>
</head>

<body>

<header>
<h1>Medicine list test 999</h1>
</header>

<main>

<p>
<a class="add" href="/medicines/new">+ Add medicine</a>
</p>

<!-- visas om inga mediciner finns -->
<div class="empty" th:if="${#lists.isEmpty(medicines)}">
No medicines yet.
</div>

<ul>

<!-- thymeleaf loop som skriver ut alla mediciner -->
<li th:each="m : ${medicines}"
th:attr="data-id=${m.id},
data-time=${#temporals.format(m.time,'HH:mm')},
data-name=${m.name},
data-taken=${m.takenToday}">

<div class="info">

<div class="topline">
<span class="time" th:text="${#temporals.format(m.time,'HH:mm')}">08:00</span>
<span class="name" th:text="${m.name}">Alvedon</span>
</div>

<div class="desc" th:text="${m.description}">after breakfast</div>

<!-- visar om medicinen tagits -->
<span class="status"
th:classappend="${m.takenToday} ? ' taken' : ' not'"
th:text="${m.takenToday} ? '✔ Taken' : 'Not taken'">
Not taken
</span>

</div>

<div class="actions">

<!-- knapp för att markera medicinen som tagen -->
<form method="post" action="/medicines/toggle" style="display:inline;">
<input type="hidden" name="id" th:value="${m.id}">
<button class="btn-take" type="submit"
th:text="${m.takenToday} ? 'Undo' : 'Take'">
Take
</button>
</form>

<!-- knapp för att ta bort medicinen 
<form method="post" action="/medicines/delete" style="display:inline;">
<input type="hidden" name="id" th:value="${m.id}">
<button class="btn-delete" type="submit"
  onclick="return confirm('Are you sure you want to delete this medicine?')">
  Delete
</button>
</form> -->
<!-- knapp för att ta bort medicinen -->
<form method="post" action="/medicines/delete" style="display:inline;"
      onclick="return confirm('Are you sure you want to delete this medicine?')">
  <input type="hidden" name="id" th:value="${m.id}">
  <button class="btn-delete" type="submit">Delete</button>
</form>

</div>

</li>
</ul>

</main>

<!-- audio-element som innehåller alarm.mp3
har lagt loop här så ljudet fortsätter automatiskt tills jag stoppar det -->
<audio id="alarmAudio" src="/alarm-new.mp3" preload="auto" loop></audio>

<script>

/* ======================================================
  variabler som  använder i hela scriptet
====================================================== */

/*  hämtar ljudfilen från audio-elementet */
const alarmAudio = document.getElementById("alarmAudio");

/* browsern kräver ett klick innan ljud får spelas */
let audioUnlocked = false;

/* sparar vilken medicin som just nu larmar */
let activeAlarmId = null;


/*låser upp ljudet efter första klicket
  annars blockerar browsern ljudet*/

function unlockAudioOnce(){

if(audioUnlocked) return;

audioUnlocked = true;

/* spelar och pausar direkt bara för att aktivera ljudet i browsern */
alarmAudio.play()
.then(()=>{
alarmAudio.pause();
alarmAudio.currentTime = 0;
console.log("Audio unlocked");
})
.catch(err => console.log("Audio unlock failed:", err));

}

/* körs första gången användaren klickar på sidan */
document.addEventListener("click",unlockAudioOnce,{once:true});
document.addEventListener("touchstart",unlockAudioOnce,{once:true});


/* 
  notifikation i browsern
*/

if("Notification" in window && Notification.permission === "default"){
Notification.requestPermission();
}

function notify(text){

if("Notification" in window && Notification.permission === "granted"){
new Notification(text);
}
else{
console.log(text);
}

}


/*hjälpfunktion som gör om HH:mm till minuter
   detta behövs så jag kan jämföra tider bättre*/

function toMinutes(hhmm){
const parts = hhmm.split(":");
const hours = parseInt(parts[0],10);
const minutes = parseInt(parts[1],10);
return hours * 60 + minutes;
}


/* startar alarmet
   här startar  ljudet bara en gång
   sedan loopar audio-elementet själv*/

function startAlarm(medicineId,medicineName){

/* om samma medicin redan larmar så gör jag inget */
if(activeAlarmId === medicineId) return;

/* om någon annan medicin larmade innan så stoppar jag den först */
stopAlarm();

activeAlarmId = medicineId;

/* visar notifikation */
notify("Time to take medicine: " + medicineName);

/* startar ljudet från början */
alarmAudio.currentTime = 0;
alarmAudio.play().catch(err=>{
console.log("Alarm play failed:",err);
});

/*console.log("Alarm started for:", medicineName);*/

}


/*  stoppar alarmet helt*/

function stopAlarm(){

alarmAudio.pause();
alarmAudio.currentTime = 0;
activeAlarmId = null;

console.log("Alarm stopped");

}


/* ======================================================
   jag kollar varje sekund om någon medicin
   ska tas nu eller redan skulle ha tagits
   alarmet fortsätter tills man trycker take
====================================================== */

function checkMedicines(){

const now = new Date();

/* nuvarande tid i format HH:mm */
const currentHHMM =
String(now.getHours()).padStart(2,"0")+":"+
String(now.getMinutes()).padStart(2,"0");

/* gör om nuvarande tid till minuter */
const currentMinutes = toMinutes(currentHHMM);

/* här sparar jag om det finns någon medicin som borde tas men inte är tagen */
let firstDueUntakenMedicine = null;

/* jag går igenom alla mediciner i listan */
document.querySelectorAll("li[data-time]").forEach(item=>{

const id = item.dataset.id;
const time = item.dataset.time;
const name = item.dataset.name;
const taken = item.dataset.taken === "true";

/* gör om medicinens tid till minuter */
const medicineMinutes = toMinutes(time);

/* om tiden har kommit eller passerat och medicinen inte är tagen
   då räknas den som aktiv */
if(!taken && medicineMinutes <= currentMinutes){

/* jag tar första medicinen jag hittar som är due och inte tagen */
if(firstDueUntakenMedicine === null){
firstDueUntakenMedicine = {
id: id,
name: name
};
}

}

});

/* om det finns en medicin som borde tas och inte är tagen
   då ska alarmet vara igång */
if(firstDueUntakenMedicine !== null){

/* starta alarmet om den inte redan är aktiv */
if(activeAlarmId !== firstDueUntakenMedicine.id){
startAlarm(firstDueUntakenMedicine.id, firstDueUntakenMedicine.name);
}

}
else{
/* om ingen medicin längre är aktuell stoppar jag alarmet */
if(activeAlarmId !== null){
stopAlarm();
}
}

}

/* jag kör kontrollen varje sekund */
setInterval(checkMedicines,1000);
console.log("Audio src:", alarmAudio.currentSrc);

/* jag kör också direkt när sidan laddas */
checkMedicines();

</script>

<script>

/* ======================================================
   registrerar service worker för pwa funktioner
====================================================== */

if("serviceWorker" in navigator){

navigator.serviceWorker.register("/service-worker.js")
.then(()=>console.log("Service worker registered"))
.catch(err=>console.log("Service worker error",err));

}

</script>

</body>
</html>
