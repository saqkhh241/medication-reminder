<!-- denna fil visar mediciner som en fysisk medicinbox -->

<!doctype html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Medicines</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#111827">

<style>

/* ===== Layout ===== */

body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
background:#f4f6fb;
color:#111827;
}

header{
background:#111827;
color:white;
padding:18px;
}

header h1{
margin:0;
font-size:22px;
}

main{
max-width:900px;
margin:auto;
padding:20px;
}

.add{
display:block;
width:230px;
margin:20px auto;
text-align:center;
background:#2563eb;
color:white;
text-decoration:none;
padding:16px;
border-radius:14px;
font-size:18px;
font-weight:700;
box-shadow:0 6px 16px rgba(0,0,0,0.15);
}
/*uuuuuuuu*/

.all-list-btn{
display:block;
width:230px;
margin:12px auto 0 auto;
text-align:center;
background:#e5e7eb;
color:#111827;
text-decoration:none;
padding:14px;
border-radius:14px;
font-size:16px;
font-weight:700;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}



.all-list-btn:hover{
background:#d1d5db;
}

/*  Banner för nästa medicin  */

.next-banner{
max-width:560px;
margin:0 auto 18px auto;
background:white;
border-radius:14px;
padding:14px 18px;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
text-align:center;
font-weight:700;
font-size:16px;
}

.next-banner.upcoming{
background:#dbeafe;
color:#1d4ed8;
}

.next-banner.tomorrow{
background:#fef3c7;
color:#92400e;
}

.next-banner.done{
background:#dcfce7;
color:#166534;
}

/*  Rutnät för mediciner  */

ul{
list-style:none;
padding:0;
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fill,150px);
gap:22px;
justify-content:center;
}

li{
background:white;
border-radius:14px;
height:170px;
width:150px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
box-shadow:0 6px 14px rgba(0,0,0,0.1);
transition:0.2s;
position:relative;
}

li:hover{
transform:translateY(-3px);
}

/* grön bakgrund om medicinen redan är tagen */
li[data-taken="true"]{
background:#dcfce7;
}

.time{
font-size:24px;
font-weight:700;
}

.name{
font-size:20px;
font-weight:600;
text-align:center;
padding:0 4px;
}

.pill{
font-size:26px;
margin:8px 0;
}



.status{
font-size:12px;
font-weight:700;
margin-bottom:6px;
text-align:center;
}

.actions{
display:flex;
gap:6px;
}

button{
border:none;
border-radius:8px;
padding:10px 14px;
cursor:pointer;
font-size:16px;
font-weight:600;
}

/* lite färg på take/undo-knappen */
.btn-take{
background:#e5e7eb;
color:#111827;
}

.btn-delete{
background:#ef4444;
color:white;
}

/*  Blinkande alarm-markering  */

.alarm-active{
animation:alarmBlink 1s infinite;
border:3px solid #dc2626;
}

@keyframes alarmBlink{
0%{background:#ffffff;}
50%{background:#fee2e2;}
100%{background:#ffffff;}
}

/* Popup-rutor  */

.popup-overlay{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.popup-box{
background:white;
padding:30px;
border-radius:12px;
text-align:center;
min-width:320px;
max-width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

.popup-box h2{
margin-top:0;
}

.popup-actions{
margin-top:20px;
display:flex;
justify-content:center;
gap:10px;
}

.popup-btn{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
font-weight:700;
}

.popup-btn-primary{
background:#2563eb;
color:white;
}

.popup-btn-danger{
background:#ef4444;
color:white;
}

.popup-btn-secondary{
background:#e5e7eb;
color:#111827;
}

</style>
</head>

<body>

<header>
<h1>Medicine Box</h1>
<div id="todayText" style="text-align:center;font-weight:700;margin-top:6px;"></div>
</header>

<main>


<!-- banner som visar nästa medicin -->
<div id="nextMedicineBanner" class="next-banner done">
No pending medicines
</div>

<a class="add" href="/medicines/new">+ Add medicine</a>

</div>
<a class="all-list-btn" href="/medicines/all">📋 Show all medicines</a>
<ul id="medicineList">

<!-- thymeleaf loop som skriver ut alla mediciner -->
<li th:each="m : ${medicines}"
th:attr="data-id=${m.id},
data-time=${#temporals.format(m.time,'HH:mm')},
data-name=${m.name},
data-desc=${m.description},
data-days=${m.days},
data-taken=${m.takenToday}">

<div class="time" th:text="${#temporals.format(m.time,'HH:mm')}"></div>

<div class="name" th:text="${m.name}"></div>



<div class="pill">💊</div>

<div class="status"
th:text="${m.takenToday} ? '✔ Taken' : 'Not taken'"></div>

<div class="actions">

<!-- knapp för att markera medicinen som tagen -->
<form method="post" action="/medicines/toggle" class="toggle-form">
<input type="hidden" name="id" th:value="${m.id}">
<button type="submit"
class="btn-take"
th:text="${m.takenToday} ? 'Undo' : 'Take'"></button>
</form>

<!-- knapp för att ta bort medicinen -->
<form method="post" action="/medicines/delete" class="delete-form">
<input type="hidden" name="id" th:value="${m.id}">
<input type="hidden" name="redirectTo" value="/medicines">
<button type="button"
class="btn-delete"
th:attr="data-name=${m.name}">
Delete
</button>
</form>

</div>

</li>

</ul>

</main>

<!-- AUDIO för alarm -->
<audio id="alarmAudio" src="/alarm-new.mp3" preload="auto" loop></audio>

<!-- ALARM POPUP: visas när det är dags att ta medicin -->
<div id="alarmPopup" class="popup-overlay">
<div class="popup-box">
<h2>⏰ Time to take medicine</h2>
<p id="alarmMedicineName"></p>
<p id="alarmMedicineDesc"></p>

<div class="popup-actions">
<button class="popup-btn popup-btn-primary"
onclick="closeAlarmPopup()">OK</button>
</div>
</div>
</div>

<!-- DELETE POPUP: bekräftelse innan borttagning -->
<div id="deletePopup" class="popup-overlay">
<div class="popup-box">
<h2>Delete medicine</h2>
<p id="deleteMedicineText"></p>

<div class="popup-actions">
<button class="popup-btn popup-btn-danger"
onclick="confirmDelete()">Yes</button>

<button class="popup-btn popup-btn-secondary"
onclick="closeDeletePopup()">Cancel</button>
</div>
</div>
</div>

<!-- EARLY TAKE POPUP: visas om användaren försöker ta medicinen före rätt tid -->
<div id="earlyTakePopup" class="popup-overlay">
<div class="popup-box">
<h2>Take medicine early?</h2>
<p id="earlyTakeText"></p>

<div class="popup-actions">
<button class="popup-btn popup-btn-primary"
onclick="confirmEarlyTake()">Yes</button>

<button class="popup-btn popup-btn-secondary"
onclick="closeEarlyTakePopup()">Cancel</button>
</div>
</div>
</div>

<script>

const alarmAudio=document.getElementById("alarmAudio");

/* variabler som håller koll på alarm och popup-formulär */
let activeAlarmId=null;
let dismissedAlarmId=null;
let pendingDeleteForm=null;
let pendingTakeForm=null;
let audioUnlocked=false;

/* Hjälpfunktioner  */

/* omvandlar tid från "HH:mm" till antal minuter */
function toMinutes(hhmm){
const p=hhmm.split(":");
return parseInt(p[0])*60+parseInt(p[1]);
}

/* gör texten snygg i banner */
function formatMinutesToText(minutes){
if(minutes === 1) return "1 minute";
return minutes + " minutes";
}

/* hämtar dagens veckodag i samma format som checkbox-värdena */
function getTodayName(){
const dayNames = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
return dayNames[new Date().getDay()];
}

/* visar dagens veckodag i toppen */
function showTodayText(){
const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const today = new Date().getDay();

document.getElementById("todayText").innerText =
"Today: " + dayNames[today];
}

/* kontrollerar om medicinen gäller idag */
function isForToday(item){
const days=item.dataset.days || "";
const todayName=getTodayName();

if(days === ""){
return true;
}

return days.includes(todayName);
}

/* visar bara mediciner som gäller idag */
function showOnlyTodayMedicines(){
document.querySelectorAll("#medicineList li").forEach(item=>{
if(isForToday(item)){
item.style.display="flex";
}else{
item.style.display="none";
}
});
}

/* Audio unlock */

/* vissa browsers kräver ett första klick innan ljud får spelas */
function unlockAudio(){
if(audioUnlocked) return;

audioUnlocked=true;

alarmAudio.play()
.then(()=>{
alarmAudio.pause();
alarmAudio.currentTime=0;
})
.catch(()=>{});
}

document.addEventListener("click",unlockAudio,{once:true});
document.addEventListener("touchstart",unlockAudio,{once:true});

/* ===== Browser notification ===== */

if("Notification" in window && Notification.permission==="default"){
Notification.requestPermission();
}

function notify(text){
if("Notification" in window && Notification.permission==="granted"){
new Notification(text);
}
}

/*  Alarm-markering  */

/* tar bort blink från alla mediciner */
function clearAlarmHighlight(){
document.querySelectorAll("li.alarm-active").forEach(item=>{
item.classList.remove("alarm-active");
});
}

/* markerar medicinen som just nu larmar */
function highlightAlarmMedicine(id){
clearAlarmHighlight();

const target=document.querySelector('li[data-id="'+id+'"]');
if(target){
target.classList.add("alarm-active");
}
}

/* Alarm popup  */

/* visar alarm-popup */
function showAlarmPopup(name,desc){
document.getElementById("alarmMedicineName").innerText=name;
document.getElementById("alarmMedicineDesc").innerText=desc || "";
document.getElementById("alarmPopup").style.display="flex";
}

/* stänger alarm-popup och stoppar ljud */
function closeAlarmPopup(){
document.getElementById("alarmPopup").style.display="none";
dismissedAlarmId=activeAlarmId;
stopAlarm();
}

/* Alarm-logik */

function startAlarm(id,name,desc){

/* starta inte samma alarm igen */
if(activeAlarmId===id) return;

/* om användaren redan stängt detta alarm, starta inte om direkt */
if(dismissedAlarmId===id) return;

activeAlarmId=id;

notify("Time to take medicine: "+name);

highlightAlarmMedicine(id);
showAlarmPopup(name,desc);

alarmAudio.currentTime=0;
alarmAudio.play().catch(()=>{});
}

/* stoppar alarmet */
function stopAlarm(){
alarmAudio.pause();
alarmAudio.currentTime=0;
activeAlarmId=null;
clearAlarmHighlight();
}

/* Sortering av mediciner  */

function sortMedicines(){

const list=document.getElementById("medicineList");
const items=[...list.children];

const now=new Date();
const currentMinutes=now.getHours()*60+now.getMinutes();

items.sort((a,b)=>{

const takenA=a.dataset.taken==="true";
const takenB=b.dataset.taken==="true";

const timeA=toMinutes(a.dataset.time);
const timeB=toMinutes(b.dataset.time);

const activeTodayA=isForToday(a);
const activeTodayB=isForToday(b);

/* mediciner för idag ska visas före andra dagar */
if(activeTodayA && !activeTodayB) return -1;
if(!activeTodayA && activeTodayB) return 1;

/* ej tagna mediciner ska visas före tagna */
if(takenA && !takenB) return 1;
if(!takenA && takenB) return -1;

/* om båda inte är tagna */
if(!takenA && !takenB){

const futureA=timeA>=currentMinutes;
const futureB=timeB>=currentMinutes;

if(futureA && !futureB) return -1;
if(!futureA && futureB) return 1;

return timeA-timeB;
}

/* om båda är tagna -> senaste tider först */
return timeB-timeA;
});

items.forEach(item=>list.appendChild(item));
}

/* Banner för nästa medicin */

function updateNextMedicineBanner(){

const banner=document.getElementById("nextMedicineBanner");
const items=[...document.querySelectorAll("#medicineList li")];

const now=new Date();
const currentMinutes=now.getHours()*60+now.getMinutes();

/* hitta alla mediciner för idag som inte är tagna */
const untakenItems=items.filter(item=>
item.dataset.taken!=="true" && isForToday(item)
);

if(untakenItems.length===0){
banner.className="next-banner done";
banner.innerText="No pending medicines";
return;
}

/* framtida mediciner idag */
let future=untakenItems.filter(item=>toMinutes(item.dataset.time)>=currentMinutes);

if(future.length>0){

future.sort((a,b)=>toMinutes(a.dataset.time)-toMinutes(b.dataset.time));

const next=future[0];
const diff=toMinutes(next.dataset.time)-currentMinutes;

banner.className="next-banner upcoming";
banner.innerText=
"⏰ Next medicine: "+
next.dataset.name+
" at "+
next.dataset.time+
" today (in "+formatMinutesToText(diff)+")";

return;
}

/* om inga fler tider finns idag, visa första otagna som nästa dag */
untakenItems.sort((a,b)=>toMinutes(a.dataset.time)-toMinutes(b.dataset.time));

const tomorrow=untakenItems[0];

banner.className="next-banner tomorrow";
banner.innerText=
"🌙 Next medicine: "+
tomorrow.dataset.name+
" at "+
tomorrow.dataset.time+
" tomorrow";
}

/* Kontroll av mediciner varje sekund */

function checkMedicines(){

const now=new Date();
const currentMinutes=now.getHours()*60+now.getMinutes();

let dueMedicine=null;

document.querySelectorAll("li[data-time]").forEach(item=>{

if(!isForToday(item)){
return;
}

const id=item.dataset.id;
const time=item.dataset.time;
const name=item.dataset.name;
const desc=item.dataset.desc;
const taken=item.dataset.taken==="true";

const medicineMinutes=toMinutes(time);

/* om medicinen inte är tagen och tiden är exakt nu */
if(!taken && medicineMinutes === currentMinutes){
if(dueMedicine===null){
dueMedicine={id,name,desc};
}
}
});

if(dueMedicine){

if(dismissedAlarmId !== dueMedicine.id){
dismissedAlarmId=null;
}

if(activeAlarmId!==dueMedicine.id){
startAlarm(dueMedicine.id,dueMedicine.name,dueMedicine.desc);
}

}else{
stopAlarm();
dismissedAlarmId=null;
}

showTodayText();
showOnlyTodayMedicines();
updateNextMedicineBanner();
sortMedicines();
}

/* Delete popup */

function openDeletePopup(form,name){

/* stäng eventuellt alarm innan delete-popup visas */
stopAlarm();
document.getElementById("alarmPopup").style.display="none";

pendingDeleteForm=form;

document.getElementById("deleteMedicineText").innerText=
"Do you want to delete " + name + " medicine?";

document.getElementById("deletePopup").style.display="flex";
}

function closeDeletePopup(){
document.getElementById("deletePopup").style.display="none";
pendingDeleteForm=null;
}

function confirmDelete(){
if(pendingDeleteForm){
pendingDeleteForm.submit();
}
}

/* Early take popup */

/* öppnar popup om användaren försöker ta medicin innan rätt tid */
function openEarlyTakePopup(form,name,time){

stopAlarm();
document.getElementById("alarmPopup").style.display="none";

pendingTakeForm=form;

document.getElementById("earlyTakeText").innerText=
"It is not time for " + name + " yet (scheduled at " + time + "). Do you want to take it anyway?";

document.getElementById("earlyTakePopup").style.display="flex";
}

/* stänger early take-popup */
function closeEarlyTakePopup(){
document.getElementById("earlyTakePopup").style.display="none";
pendingTakeForm=null;
}

/* om användaren väljer ja skickas formuläret ändå */
function confirmEarlyTake(){
if(pendingTakeForm){
pendingTakeForm.submit();
}
}

/* Events  */

/* delete-knappar öppnar popup istället för att skicka direkt */
document.querySelectorAll(".btn-delete").forEach(btn=>{
btn.addEventListener("click",function(){

const form=btn.closest("form");
const name=btn.dataset.name;

openDeletePopup(form,name);
});
});

/* kontrollera take/undo innan formuläret skickas */
document.querySelectorAll(".toggle-form").forEach(form=>{
form.addEventListener("submit",function(e){

const item=form.closest("li");
const taken=item.dataset.taken==="true";
const medicineTime=toMinutes(item.dataset.time);

const now=new Date();
const currentMinutes=now.getHours()*60+now.getMinutes();

/* stoppa alarm-popup om användaren klickar */
stopAlarm();
document.getElementById("alarmPopup").style.display="none";

/* bara för Take, inte för Undo */
if(!taken && currentMinutes < medicineTime){
e.preventDefault();
openEarlyTakePopup(form,item.dataset.name,item.dataset.time);
}
});
});

/* Start */

showTodayText();
showOnlyTodayMedicines();
sortMedicines();
updateNextMedicineBanner();

setInterval(checkMedicines,1000);
checkMedicines();

</script>

</body>
</html>
