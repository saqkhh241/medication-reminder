<!doctype html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>All medicines</title>

<style>
body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
background:#f4f6fb;
color:#111827;
}

header{
background:#111827;
color:white;
padding:18px;
}

header h1{
margin:0;
font-size:22px;
}
.medicine-count{
text-align:center;
font-size:18px;
font-weight:700;
color:#374151;
margin:14px 0;
}

main{
max-width:1000px;
margin:auto;
padding:20px;
}

.back-btn{
display:inline-block;
margin-bottom:20px;
background:#e5e7eb;
color:#111827;
text-decoration:none;
padding:12px 16px;
border-radius:10px;
font-weight:700;
}

ul{
list-style:none;
padding:0;
margin:0;
display:grid;
grid-template-columns:repeat(auto-fill,180px);
gap:20px;
justify-content:center;
}

li{
background:white;
border-radius:14px;
min-height:200px;
padding:16px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
box-shadow:0 6px 14px rgba(0,0,0,0.1);
text-align:center;
}

.time{
font-size:24px;
font-weight:700;
}

.name{
font-size:20px;
font-weight:600;
margin-top:6px;
}

.days{
font-size:13px;
font-weight:700;
color:#4b5563;
margin-top:8px;
}

.desc{
font-size:12px;
color:#6b7280;
margin-top:8px;
}



.empty{
text-align:center;
font-size:18px;
font-weight:600;
color:#6b7280;
margin-top:40px;
}

.actions{
margin-top:14px;
display:flex;
justify-content:center;
}

.btn-delete{
border:none;
background:#ef4444;
color:white;
padding:10px 16px;
border-radius:10px;
font-size:15px;
font-weight:700;
cursor:pointer;
}

.btn-delete:hover{
background:#dc2626;
}
</style>
</head>

<body>

<header>
<h1>All medicines</h1>
</header>

<main>

<a class="back-btn" href="/medicines">← Back to today</a>

<ul th:if="${!#lists.isEmpty(medicines)}">
<li th:each="m : ${medicines}">
    <div class="name" th:text="${m.name}"></div>
    <div class="time" th:text="${#temporals.format(m.time,'HH:mm')}"></div>
    <div class="days" th:text="${m.daysFormatted}"></div>

    <div class="desc"
        th:if="${m.description != null and !m.description.isBlank()}"
        th:text="${m.description}"></div>

    <div class="status"
        th:text="${m.takenToday} ? '✔ Taken today' : 'Not taken today'"></div>

    <div class="actions">
        <form method="post" action="/medicines/delete">
            <input type="hidden" name="id" th:value="${m.id}">
            <input type="hidden" name="redirectTo" value="/medicines/all">
            <button type="submit" class="btn-delete">Delete</button>
        </form>
    </div>
</li>
</ul>

<div class="empty" th:if="${#lists.isEmpty(medicines)}">
No medicines saved
</div>

</main>

</body>
</html>
