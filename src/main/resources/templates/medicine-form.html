<!-- Den här filen visar formuläret där användaren kan lägga till en ny medicin.
     Användaren fyller i namn, tid, veckodagar och en valfri beskrivning. -->

<!doctype html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head>

  <!-- Grundläggande meta-taggar -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- Titel i webbläsarfliken -->
  <title>Add medicine</title>

  <!-- Flatpickr CSS för egen tidsväljare -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

  <style>

    /* ===== Grundlayout för hela sidan ===== */
    body{
      font-family: Arial, Helvetica, sans-serif;
      margin:0;
      background:#f6f7fb;
      color:#111827;
    }

    /* Sidhuvud */
    header{
      background:#111827;
      color:white;
      padding:16px;
    }

    /* Rubrik i header */
    header h1{
      margin:0;
      font-size:22px;
    }

    /* Huvudinnehåll */
    main{
      max-width:720px;
      margin:0 auto;
      padding:16px;
    }

    /* Kort för formuläret */
    .card{
      background:white;
      border-radius:14px;
      padding:16px;
      box-shadow:0 4px 14px rgba(0,0,0,0.08);
    }

    /* Varje formulärrad */
    .row{
      margin-bottom:14px;
    }

    /* Etiketter */
    label{
      display:block;
      font-weight:700;
      margin-bottom:6px;
      font-size:14px;
    }

    /* Vanliga inputfält */
    input{
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #d1d5db;
      font-size:15px;
      box-sizing:border-box;
      outline:none;
    }

    /* Fokus på input */
    input:focus{
      border-color:#2563eb;
    }

    /* ===== Days checkboxes ===== */

    .days-box{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:8px 12px;
      margin-top:6px;
    }

    .days-box label{
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:400;
      margin-bottom:0;
      font-size:14px;
    }

    .days-box input{
      width:auto;
      margin:0;
    }

    /* Knappområde */
    .actions{
      display:flex;
      gap:10px;
      margin-top:14px;
      align-items:center;
      flex-wrap:wrap;
    }

    /* Gemensam stil för knappar */
    button{
      border:none;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:700;
    }

    /* Save-knapp */
    .btn-save{
      background:#2563eb;
      color:white;
    }

    /* Cancel-länk som ser ut som knapp */
    .btn-cancel{
      display:inline-block;
      padding:10px 14px;
      border-radius:10px;
      background:#e5e7eb;
      color:#111827;
      text-decoration:none;
      font-weight:700;
    }

    /* Hjälptext */
    .hint{
      color:#6b7280;
      font-size:13px;
      margin-top:6px;
    }

    /* Anpassning av Flatpickr-fältet */
    #time{
      background:white;
      cursor:pointer;
    }

    /* Lite snyggare popup */
    .flatpickr-calendar{
      font-size:14px;
      border-radius:12px;
      box-shadow:0 8px 24px rgba(0,0,0,0.18);
    }

    /* Tydligare vald tid */
    .flatpickr-time input{
      font-size:18px !important;
      font-weight:700;
    }

  </style>
</head>

<body>

<header>
  <h1>Add medicine</h1>
</header>

<main>

  <div class="card">
    <form method="post" action="/medicines">

      <!-- ===== Name ===== -->

      <div class="row">
        <label for="name">Name</label>

        <!--
          name="name" måste matcha @RequestParam String name i controllern
        -->

        <input
          id="name"
          name="name"
          required
          placeholder="e.g. Alvedon">
      </div>


      <!--  Time  -->

      <div class="row">
      <label for="time">Time</label>

        <input
          id="time"
          name="time"
          type="text"
          required
          placeholder="Click to choose time"
          readonly>

        <div class="hint">
          Choose the time in 24-hour format (example 08:00 or 19:30).
        </div>
      </div>


      <!-- ===== Days ===== -->

      <div class="row">
        <label>Days</label>

        <!--
          Användaren kan välja vilka veckodagar medicinen ska tas
        -->

        <div class="days-box">

          <label><input type="checkbox" name="days" value="MONDAY"> Monday</label>
          <label><input type="checkbox" name="days" value="TUESDAY"> Tuesday</label>
          <label><input type="checkbox" name="days" value="WEDNESDAY"> Wednesday</label>
          <label><input type="checkbox" name="days" value="THURSDAY"> Thursday</label>
          <label><input type="checkbox" name="days" value="FRIDAY"> Friday</label>
          <label><input type="checkbox" name="days" value="SATURDAY"> Saturday</label>
          <label><input type="checkbox" name="days" value="SUNDAY"> Sunday</label>

        </div>

        <div class="hint">
          Choose the days when this medicine should be taken.
        </div>

      </div>


      <!--  Description  -->

      <div class="row">
        <label for="description">Description</label>

        <input
          id="description"
          name="description"
          placeholder="e.g. after breakfast">

        <div class="hint">
          Optional. Example: before food / after food / with water.
        </div>
      </div>


      <!--  Buttons -->

      <div class="actions">

        <!-- Save skickar formuläret -->

        <button class="btn-save" type="submit">
          Save
        </button>

        <!-- Cancel går tillbaka till listan -->

        <a class="btn-cancel" href="/medicines">
          Cancel
        </a>

      </div>

    </form>

  </div>

</main>


<!-- Flatpickr JavaScript -->

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>

  /*
    Här aktiverar vi tidsväljaren.

    enableTime   = aktiverar tidsval
    noCalendar   = ingen kalender
    dateFormat   = HH:mm
    time_24hr    = 24h format
    minuteIncrement = användaren kan välja varje minut
  */

  flatpickr("#time", {
    enableTime: true,
    noCalendar: true,
    dateFormat: "H:i",
    time_24hr: true,
    minuteIncrement: 1,
    allowInput: false
  });

</script>

</body>
</html>
